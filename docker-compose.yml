services:
    db:
        image: postgres:latest
        environment:
            POSTGRES_DB: restorme_db
            POSTGRES_USER: restorme_user
            POSTGRES_PASSWORD: restorme_password
        volumes:
            - db_data:/var/lib/postgresql/18/       
        ports:
            - "5432:5432"
    object-storage:
        image: minio/minio:latest
        environment:
            MINIO_ROOT_USER: minio
            MINIO_ROOT_PASSWORD: minio123
        command: server /data --console-address ":9001"
        volumes:
            - object_storage_data:/data
        ports:
            - "9000:9000"
            - "9001:9001"

volumes:
    db_data:
    object_storage_data: